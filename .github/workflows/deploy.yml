name: CI/CD Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/stagekey.pem
          chmod 600 ~/.ssh/stagekey.pem

      - name: Copy jar to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/stagekey.pem \
            build/libs/*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_APP_DIR }}/app.jar

      - name: Restart stageon service
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/stagekey.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo systemctl daemon-reload && sudo systemctl restart stageon && sudo systemctl status stageon --no-pager -l"
