name: CI/CD Deploy

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # 변경 1: 지금 어떤 커밋으로 빌드되는지 확인
      - name: Show build commit
        run: |
          echo "===== CURRENT BRANCH ====="
          git rev-parse --abbrev-ref HEAD
          echo "===== LAST COMMIT ====="
          git log -1 --oneline

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 변경 2: Gradle 캐시/데몬 완전 종료 (이전 코드가 jar에 섞이는 현상 방지)
      - name: Clear Gradle Cache
        run: |
          ./gradlew --stop || true
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf ~/.gradle/native

      # 변경 3: 캐시 OFF로 완전 재빌드 (최신 코드 100% 반영)
      - name: Build with Gradle
        run: ./gradlew --no-build-cache clean bootJar

      - name: List built jars
        run: ls -al build/libs

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/stagekey.pem
          chmod 600 ~/.ssh/stagekey.pem

      - name: Copy jar to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/stagekey.pem \
            build/libs/STAGEON-was-0.0.1-SNAPSHOT.jar \
            ubuntu@13.209.42.138:/home/ubuntu/stage_on_WAS/build/libs/STAGEON-was-0.0.1-SNAPSHOT.jar

      - name: Restart stageon service
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/stagekey.pem \
            ubuntu@13.209.42.138 \
            "sudo systemctl daemon-reload && sudo systemctl restart stageon && sudo systemctl status stageon --no-pager -l"
